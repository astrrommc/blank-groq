<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>BLANK_</title>
<style>
:root {
  --sidebar-w: 260px;
  --strip-w:   56px;
  --bg:        #000;
  --sidebar-bg:#0a0a0a;
  --border:    rgba(255,255,255,0.07);
  --font:      "SF Pro Display", -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: #fff;
  font-family: var(--font);
  height: 100dvh;
  width: 100vw;
  display: flex;
  overflow: hidden;
}

/* ═══════════════════════════════
   SIDEBAR
═══════════════════════════════ */
#sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  height: 100%;
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
  transition: width 0.3s ease, min-width 0.3s ease;
  z-index: 200;
}

/* Collapsed desktop strip */
#sidebar.collapsed {
  width: var(--strip-w);
  min-width: var(--strip-w);
}
#sidebar.collapsed .sidebar-full { display: none; }
#sidebar.collapsed .sidebar-strip { display: flex; }

.sidebar-full {
  display: flex;
  flex-direction: column;
  height: 100%;
}

.sidebar-header {
  padding: 20px 16px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 12px;
  flex-shrink: 0;
}

.sidebar-brand {
  font-size: 1.15rem;
  font-weight: 800;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  background: linear-gradient(110deg, #555 30%, #fff 50%, #555 70%);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: shimmer 8s linear infinite;
}

.new-chat-btn {
  align-items: center;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  color: #aaa;
  cursor: pointer;
  display: flex;
  font-family: var(--font);
  font-size: 0.7rem;
  gap: 8px;
  letter-spacing: 0.1em;
  padding: 9px 12px;
  text-transform: uppercase;
  transition: background 0.2s, color 0.2s;
  width: 100%;
}
.new-chat-btn:hover { background: rgba(255,255,255,0.09); color: #fff; }
.new-chat-btn svg { fill: currentColor; flex-shrink: 0; height: 14px; width: 14px; }

.sessions-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.sessions-list::-webkit-scrollbar { width: 3px; }
.sessions-list::-webkit-scrollbar-thumb { background: #222; border-radius: 4px; }

.session-item {
  align-items: center;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  gap: 8px;
  justify-content: space-between;
  padding: 9px 10px;
  transition: background 0.15s;
}
.session-item:hover { background: rgba(255,255,255,0.05); }
.session-item.active { background: rgba(255,255,255,0.08); }

.session-title {
  color: #888;
  flex: 1;
  font-size: 0.78rem;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.session-item.active .session-title { color: #fff; }

.session-del {
  background: transparent;
  border: none;
  color: #2a2a2a;
  cursor: pointer;
  flex-shrink: 0;
  padding: 2px;
  transition: color 0.2s;
}
.session-del:hover { color: #ff4444; }
.session-del svg { fill: currentColor; height: 13px; width: 13px; }

.sidebar-footer {
  align-items: center;
  border-top: 1px solid var(--border);
  display: flex;
  flex-shrink: 0;
  justify-content: space-between;
  padding: 12px 16px;
}
.sidebar-user { color: #444; font-size: 0.7rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.logout-btn {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 8px;
  color: #444;
  cursor: pointer;
  flex-shrink: 0;
  font-family: var(--font);
  font-size: 0.55rem;
  letter-spacing: 0.12em;
  padding: 4px 8px;
  text-transform: uppercase;
  transition: color 0.2s, border-color 0.2s;
}
.logout-btn:hover { border-color: rgba(255,255,255,0.18); color: #aaa; }

/* Collapsed strip */
.sidebar-strip {
  display: none;
  flex-direction: column;
  align-items: center;
  padding: 14px 0;
  gap: 14px;
  height: 100%;
}
.strip-new-btn {
  align-items: center;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  color: #666;
  cursor: pointer;
  display: flex;
  height: 36px;
  justify-content: center;
  transition: background 0.2s, color 0.2s;
  width: 36px;
  flex-shrink: 0;
}
.strip-new-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
.strip-new-btn svg { fill: currentColor; height: 16px; width: 16px; }
.strip-brand {
  animation: shimmer 8s linear infinite;
  background: linear-gradient(110deg, #555 30%, #fff 50%, #555 70%);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  flex: 1;
  font-size: 0.52rem;
  font-weight: 800;
  letter-spacing: 0.25em;
  text-align: center;
  text-transform: uppercase;
  transform: rotate(180deg);
  writing-mode: vertical-rl;
}

/* Mobile overlay */
#sidebarOverlay {
  backdrop-filter: blur(2px);
  background: rgba(0,0,0,0.6);
  display: none;
  inset: 0;
  position: fixed;
  z-index: 199;
}
#sidebarOverlay.visible { display: block; }

/* ═══════════════════════════════
   MAIN
═══════════════════════════════ */
.main {
  display: flex;
  flex: 1;
  flex-direction: column;
  min-width: 0;
  overflow: hidden;
  position: relative;
}

header {
  align-items: center;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  background: linear-gradient(to bottom, rgba(0,0,0,0.96) 65%, transparent 100%);
  display: flex;
  gap: 12px;
  left: 0; right: 0; top: 0;
  overflow: visible;
  padding: 18px 20px 14px;
  position: absolute;
  text-align: center;
  z-index: 400;
}

#menuBtn {
  background: transparent;
  border: none;
  color: #555;
  cursor: pointer;
  flex-shrink: 0;
  padding: 4px;
  transition: color 0.2s;
}
#menuBtn:hover { color: #fff; }
#menuBtn svg { display: block; fill: currentColor; height: 20px; width: 20px; }

.header-center {
  align-items: center;
  display: flex;
  flex: 1;
  flex-direction: column;
}

header h1 {
  animation: shimmer 8s linear infinite;
  background: linear-gradient(110deg, #555 30%, #fff 50%, #555 70%);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  font-size: 1.4rem;
  font-weight: 800;
  letter-spacing: 0.3em;
  text-transform: uppercase;
}

.header-sub {
  color: #666;
  font-size: 0.52rem;
  letter-spacing: 0.2em;
  margin-top: 2px;
  text-transform: uppercase;
}

/* ── Model dropdown ── */
.model-pill {
  display: inline-block;
  margin-top: 7px;
  position: relative;
}

.model-trigger {
  align-items: center;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  color: #777;
  cursor: pointer;
  display: flex;
  font-family: var(--font);
  font-size: 0.6rem;
  gap: 5px;
  letter-spacing: 0.12em;
  padding: 4px 10px;
  text-transform: uppercase;
  transition: border-color 0.2s, color 0.2s;
  user-select: none;
  white-space: nowrap;
}
.model-trigger:hover { border-color: rgba(255,255,255,0.2); color: #bbb; }
.model-trigger svg { fill: currentColor; height: 10px; transition: transform 0.2s; width: 10px; }
.model-trigger.open svg { transform: rotate(180deg); }

.model-dropdown {
  background: #141414;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 14px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.95);
  display: none;
  flex-direction: column;
  gap: 2px;
  min-width: 170px;
  padding: 6px;
  position: fixed;
  z-index: 9999;
}
.model-dropdown.open { display: flex; }

.model-option {
  align-items: center;
  border-radius: 9px;
  color: #777;
  cursor: pointer;
  display: flex;
  font-family: var(--font);
  font-size: 0.72rem;
  justify-content: space-between;
  letter-spacing: 0.06em;
  padding: 10px 12px;
  text-transform: uppercase;
  transition: background 0.15s, color 0.15s;
}
.model-option:hover { background: rgba(255,255,255,0.07); color: #fff; }
.model-option.selected { color: #fff; }
.model-check {
  background: #00ff87;
  border-radius: 50%;
  box-shadow: 0 0 8px rgba(0,255,135,0.8);
  flex-shrink: 0;
  height: 7px;
  opacity: 0;
  width: 7px;
}
.model-option.selected .model-check { opacity: 1; }

.header-right { flex-shrink: 0; width: 28px; }

@keyframes shimmer { to { background-position: -200% center; } }

/* ═══════════════════════════════
   CHAT
═══════════════════════════════ */
#chat {
  -webkit-overflow-scrolling: touch;
  display: flex;
  flex: 1;
  flex-direction: column;
  gap: 32px;
  overflow-y: auto;
  overscroll-behavior: contain;
  padding: 120px max(24px, calc((100% - 720px) / 2)) 160px;
}
#chat.empty {
  align-items: center;
  justify-content: center;
  padding-bottom: 60px;
  padding-top: 0;
}
#chat::-webkit-scrollbar { width: 5px; }
#chat::-webkit-scrollbar-thumb { background: #1a1a1a; border-radius: 4px; }

/* Welcome */
.welcome-msg {
  animation: fadeUp 0.4s ease-out;
  text-align: center;
}
.welcome-title {
  color: #fff;
  display: block;
  font-size: 2rem;
  font-weight: 600;
  letter-spacing: -0.01em;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Messages */
.msg {
  font-size: 1rem;
  line-height: 1.85;
  max-width: 80%;
  padding-bottom: 4px;
  position: relative;
  width: fit-content;
}
.msg-content {
  display: block;
  letter-spacing: 0.01em;
  white-space: pre-wrap;
  word-break: break-word;
}

.user { align-self: flex-end; animation: slideUp 0.25s ease-out; }
.user .msg-content {
  background: #1c1c1c;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 18px 18px 4px 18px;
  color: #fff;
  display: inline-block;
  padding: 10px 16px;
}

.bot { align-self: flex-start; color: #fff; }
.bot-label {
  color: #fff;
  display: block;
  font-size: 0.58rem;
  letter-spacing: 2px;
  line-height: 1;
  margin-bottom: 10px;
  opacity: 0.25;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Copy btn */
.copy-btn {
  background: transparent;
  border: none;
  bottom: -22px;
  cursor: pointer;
  filter: none;
  opacity: 0.3;
  padding: 4px;
  position: absolute;
  right: 0;
  transition: opacity 0.2s, filter 0.2s;
}
.copy-btn svg { fill: #777; height: 13px; width: 13px; }
.copy-btn:hover { filter: drop-shadow(0 0 5px rgba(255,255,255,0.5)); opacity: 1; }
.copy-btn:hover svg { fill: #fff; }

/* Spinner */
.spinner {
  animation: spin 0.8s linear infinite;
  border: 2px solid rgba(255,255,255,0.08);
  border-radius: 50%;
  border-top-color: rgba(255,255,255,0.5);
  height: 20px;
  margin: 4px 0 2px 2px;
  width: 20px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Dot typing */
.dot-typing {
  align-items: center;
  display: inline-flex;
  gap: 4px;
  height: 1em;
  margin-left: 3px;
  vertical-align: middle;
}
.dot-typing span {
  animation: dotBounce 1.2s ease-in-out infinite;
  background: rgba(255,255,255,0.4);
  border-radius: 50%;
  display: inline-block;
  height: 4px;
  width: 4px;
}
.dot-typing span:nth-child(1) { animation-delay: 0s; }
.dot-typing span:nth-child(2) { animation-delay: 0.2s; }
.dot-typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotBounce {
  0%, 60%, 100% { opacity: 0.2; transform: translateY(0); }
  30%            { opacity: 1;   transform: translateY(-4px); }
}

/* ═══════════════════════════════
   INPUT AREA
═══════════════════════════════ */
.input-area {
  align-items: center;
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  background: rgba(18,18,18,0.88);
  border: 1px solid var(--border);
  border-radius: 24px;
  bottom: 20px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.7);
  display: flex;
  gap: 8px;
  max-width: 720px;
  padding: 8px 12px;
  position: fixed;
  transition: border-color 0.2s, bottom 0.4s cubic-bezier(0.4,0,0.2,1), left 0.3s ease, transform 0.4s cubic-bezier(0.4,0,0.2,1);
  z-index: 100;

  /* Desktop default: center within main (right of sidebar) */
  left: calc(var(--sidebar-w) + (100% - var(--sidebar-w)) / 2);
  transform: translateX(-50%);
  width: calc(100% - var(--sidebar-w) - 60px);
}
.input-area:focus-within { border-color: rgba(255,255,255,0.18); }

/* Chat empty → float to vertical center */
body.chat-empty .input-area {
  bottom: 50%;
  transform: translateX(-50%) translateY(50%);
}

/* Sidebar collapsed */
body.sidebar-collapsed .input-area {
  left: calc(var(--strip-w) + (100% - var(--strip-w)) / 2);
  width: calc(100% - var(--strip-w) - 60px);
}

#input {
  background: transparent;
  border: none;
  color: #fff;
  display: block;
  flex: 1;
  font-family: var(--font);
  font-size: 1rem;
  line-height: 1.5;
  max-height: 160px;
  min-width: 0;
  overflow-y: auto;
  padding: 6px 8px;
  resize: none;
}
#input::placeholder { color: #444; }
#input::-webkit-scrollbar { width: 3px; }
#input::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

.mic-btn {
  align-items: center;
  background: transparent;
  border: none;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  flex-shrink: 0;
  height: 40px;
  justify-content: center;
  transition: background 0.2s;
  width: 40px;
}
.mic-btn svg { fill: #555; height: 18px; transition: fill 0.2s; width: 18px; }
.mic-btn:hover svg { fill: #bbb; }
.mic-btn.listening { background: rgba(255,50,50,0.12); }
.mic-btn.listening svg { animation: pulse 1s ease-in-out infinite; fill: #ff4444; }
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.5; transform: scale(0.88); }
}

.send-btn {
  align-items: center;
  animation: btnGlow 3s ease-in-out infinite;
  background: #fff;
  border: none;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  flex-shrink: 0;
  height: 40px;
  justify-content: center;
  transition: transform 0.2s, opacity 0.2s;
  width: 40px;
}
.send-btn:hover { transform: scale(1.06); }
.send-btn svg { fill: #000; height: 18px; transform: translateX(2px); width: 18px; }
.send-btn:disabled { animation: none; opacity: 0.4; transform: none; }
@keyframes btnGlow {
  0%, 100% { box-shadow: 0 0 0 rgba(255,255,255,0); }
  50%       { box-shadow: 0 0 20px rgba(255,255,255,0.45); }
}

/* ═══════════════════════════════
   SCROLL BTN + VOICE TOAST
═══════════════════════════════ */
#scrollBtn {
  align-items: center;
  backdrop-filter: blur(10px);
  background: rgba(28,28,28,0.92);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 50%;
  bottom: 100px;
  color: #999;
  cursor: pointer;
  display: flex;
  height: 36px;
  justify-content: center;
  left: 50%;
  opacity: 0;
  pointer-events: none;
  position: fixed;
  transform: translateX(-50%) translateY(8px);
  transition: opacity 0.25s, transform 0.25s;
  width: 36px;
  z-index: 99;
}
#scrollBtn.visible { opacity: 1; pointer-events: all; transform: translateX(-50%) translateY(0); }
#scrollBtn:hover { background: rgba(50,50,50,0.95); color: #fff; }
#scrollBtn svg { fill: currentColor; height: 18px; width: 18px; }

#voiceToast {
  backdrop-filter: blur(10px);
  background: rgba(255,50,50,0.1);
  border: 1px solid rgba(255,80,80,0.2);
  border-radius: 20px;
  bottom: 90px;
  color: #ff6666;
  font-size: 0.6rem;
  left: 50%;
  letter-spacing: 0.15em;
  opacity: 0;
  padding: 5px 14px;
  pointer-events: none;
  position: fixed;
  text-transform: uppercase;
  transform: translateX(-50%) translateY(6px);
  transition: opacity 0.2s, transform 0.2s;
  z-index: 98;
}
#voiceToast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ═══════════════════════════════
   MOBILE
═══════════════════════════════ */
@media (max-width: 700px) {
  #sidebar {
    height: 100%;
    left: 0; top: 0;
    position: fixed;
    transform: translateX(-100%);
    transition: transform 0.3s ease;
    width: var(--sidebar-w) !important;
    min-width: var(--sidebar-w) !important;
  }
  #sidebar.open { transform: translateX(0); }
  #sidebar.collapsed { width: var(--sidebar-w) !important; min-width: var(--sidebar-w) !important; }
  #sidebar.collapsed .sidebar-full { display: flex; }
  #sidebar.collapsed .sidebar-strip { display: none; }

  .main { width: 100%; }
  header { padding: 14px 16px 12px; }
  header h1 { font-size: 1.1rem; }
  .msg { font-size: 0.95rem; max-width: 92%; }
  #chat { padding: 100px 14px 130px; }

  .input-area {
    bottom: 12px !important;
    left: 50% !important;
    transform: translateX(-50%) !important;
    width: 94% !important;
    border-radius: 20px;
  }
  body.chat-empty .input-area {
    bottom: 50% !important;
    transform: translateX(-50%) translateY(50%) !important;
  }
  #scrollBtn { bottom: 88px; }
  #voiceToast { bottom: 80px; }
  .copy-btn { opacity: 0.4; }
}
</style>
</head>
<body class="chat-empty">

<div id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="sidebar-full">
    <div class="sidebar-header">
      <span class="sidebar-brand">BLANK_</span>
      <button class="new-chat-btn" onclick="startNewChat()">
        <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6z"/></svg>
        New Chat
      </button>
    </div>
    <div class="sessions-list" id="sessionsList"></div>
    <div class="sidebar-footer">
      <span class="sidebar-user">{{ username }}</span>
      <a href="/logout" class="logout-btn">Logout</a>
    </div>
  </div>

  <div class="sidebar-strip">
    <button class="strip-new-btn" onclick="startNewChat()" title="New Chat">
      <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6z"/></svg>
    </button>
    <span class="strip-brand">BLANK_</span>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <header>
    <button id="menuBtn" onclick="toggleSidebar()" title="Toggle sidebar">
      <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
    </button>

    <div class="header-center">
      <h1>BLANK_</h1>
      <span class="header-sub">System Online</span>
      <div class="model-pill" id="modelPill">
        <div class="model-trigger" id="modelTrigger" onclick="toggleModelDropdown()">
          <span id="modelLabel">Flash ⚡</span>
          <svg viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>
        </div>
        <div class="model-dropdown" id="modelDropdown">
          <div class="model-option selected" data-value="llama-3.1-8b-instant" onclick="selectModel(this)">
            Flash ⚡ <span class="model-check"></span>
          </div>
          <div class="model-option" data-value="mixtral-8x7b-32768" onclick="selectModel(this)">
            Balanced <span class="model-check"></span>
          </div>
          <div class="model-option" data-value="gemma2-9b-it" onclick="selectModel(this)">
            Precise <span class="model-check"></span>
          </div>
          <div class="model-option" data-value="llama-3.3-70b-versatile" onclick="selectModel(this)">
            Reasoning <span class="model-check"></span>
          </div>
        </div>
      </div>
    </div>

    <div class="header-right"></div>
  </header>

  <button id="scrollBtn" onclick="forceScrollBottom()">
    <svg viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg>
  </button>

  <div id="voiceToast">● Listening…</div>

  <div id="chat" class="empty">
    <div class="welcome-msg" id="welcomeMsg">
      <span class="welcome-title">Ready.</span>
    </div>
  </div>

  <div class="input-area">
    <textarea id="input" placeholder="Ask BLANK_" autocomplete="off" rows="1"></textarea>
    <button id="micBtn" class="mic-btn" onclick="toggleVoice()" title="Voice">
      <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3.01 2.83 5.4 5.91 5.88V20H9c-.55 0-1 .45-1 1s.45 1 1 1h6c.55 0 1-.45 1-1s-.45-1-1-1h-2v-2.02c3.08-.47 5.42-2.87 5.91-5.88.1-.6-.39-1.1-1-1.1z"/></svg>
    </button>
    <button id="sendBtn" class="send-btn" onclick="send()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
/* ── Refs ── */
const chatEl       = document.getElementById("chat");
const input        = document.getElementById("input");
const btn          = document.getElementById("sendBtn");
const micBtn       = document.getElementById("micBtn");
const scrollBtn    = document.getElementById("scrollBtn");
const voiceToast   = document.getElementById("voiceToast");
const sidebar      = document.getElementById("sidebar");
const overlay      = document.getElementById("sidebarOverlay");
const sessionsList = document.getElementById("sessionsList");

/* ── State ── */
let history        = [];
let currentSessId  = null;
let userScrolledUp = false;
let isTyping       = false;
let selectedModel  = "llama-3.1-8b-instant";

/* ═══════════════════════════════════════
   EMPTY STATE
═══════════════════════════════════════ */
function checkEmpty() {
  const msgs    = chatEl.querySelectorAll(".msg");
  const isEmpty = msgs.length === 0;

  chatEl.classList.toggle("empty", isEmpty);
  document.body.classList.toggle("chat-empty", isEmpty);

  let wm = document.getElementById("welcomeMsg");
  if (isEmpty && !wm) {
    const w = document.createElement("div");
    w.className = "welcome-msg";
    w.id = "welcomeMsg";
    w.innerHTML = `<span class="welcome-title">Ready.</span>`;
    chatEl.appendChild(w);
  } else if (!isEmpty && wm) {
    wm.remove();
  }
}

/* ═══════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════ */
function isMobile() { return window.innerWidth <= 700; }

function toggleSidebar() {
  if (isMobile()) {
    sidebar.classList.contains("open") ? closeSidebar() : openSidebar();
  } else {
    const col = sidebar.classList.toggle("collapsed");
    document.body.classList.toggle("sidebar-collapsed", col);
  }
}
function openSidebar()  { sidebar.classList.add("open");    overlay.classList.add("visible"); }
function closeSidebar() { sidebar.classList.remove("open"); overlay.classList.remove("visible"); }

/* ═══════════════════════════════════════
   SESSION MANAGEMENT
═══════════════════════════════════════ */
async function loadSessions() {
  try {
    const res  = await fetch("/sessions", { credentials: "include" });
    const data = await res.json();
    renderSessions(data.sessions || []);
  } catch(e) { console.error("loadSessions:", e); }
}

function renderSessions(sessions) {
  sessionsList.innerHTML = "";
  if (!sessions.length) {
    sessionsList.innerHTML = `<div style="color:#2a2a2a;font-size:0.7rem;padding:14px 10px;letter-spacing:0.08em;">No chats yet</div>`;
    return;
  }
  sessions.forEach(s => {
    const div = document.createElement("div");
    div.className = "session-item" + (s.id === currentSessId ? " active" : "");
    div.dataset.id = s.id;
    div.innerHTML = `
      <span class="session-title">${escHtml(s.title)}</span>
      <button class="session-del" onclick="deleteSession(event,${s.id})" title="Delete">
        <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
      </button>`;
    div.addEventListener("click", () => loadSession(s.id));
    sessionsList.appendChild(div);
  });
}

async function startNewChat() {
  // If current session has no messages, reuse it — don't create another empty one
  if (currentSessId) {
    const msgs = chatEl.querySelectorAll(".msg");
    if (msgs.length === 0) {
      // Already on an empty chat — just focus input
      closeSidebar();
      input.focus();
      return;
    }
  }
  try {
    const res  = await fetch("/sessions/new", { method: "POST", credentials: "include" });
    const data = await res.json();
    currentSessId = data.id;
    history = [];
    clearChatUI();
    await loadSessions();
    closeSidebar();
    input.focus();
  } catch(e) { console.error("startNewChat:", e); }
}

async function loadSession(id) {
  try {
    const res  = await fetch(`/sessions/${id}`, { credentials: "include" });
    const data = await res.json();
    if (data.error) return;

    currentSessId = data.id;
    history = data.messages.map(m => ({ role: m.role, content: m.content }));

    clearChatUI();
    data.messages.forEach(m => {
      if (m.role === "user") addUserMsgInstant(m.content);
      else addBotMsgInstant(m.content);
    });

    checkEmpty();
    forceScrollBottom();
    await loadSessions();
    closeSidebar();
  } catch(e) { console.error("loadSession:", e); }
}

async function deleteSession(e, id) {
  e.stopPropagation();
  try {
    await fetch(`/sessions/${id}`, { method: "DELETE", credentials: "include" });
    if (currentSessId === id) {
      currentSessId = null;
      history = [];
      clearChatUI();
    }
    await loadSessions();
  } catch(e) { console.error("deleteSession:", e); }
}

/* ═══════════════════════════════════════
   SCROLL
═══════════════════════════════════════ */
chatEl.addEventListener("scroll", () => {
  const dist = chatEl.scrollHeight - chatEl.scrollTop - chatEl.clientHeight;
  userScrolledUp = dist > 80;
  scrollBtn.classList.toggle("visible", userScrolledUp);
});
chatEl.addEventListener("touchstart", () => { userScrolledUp = true; }, { passive: true });
chatEl.addEventListener("wheel",      () => { userScrolledUp = true; }, { passive: true });

function forceScrollBottom() {
  chatEl.scrollTop = chatEl.scrollHeight;
  userScrolledUp = false;
  scrollBtn.classList.remove("visible");
}
function autoScroll() { if (!userScrolledUp) chatEl.scrollTop = chatEl.scrollHeight; }

/* ═══════════════════════════════════════
   TEXTAREA
═══════════════════════════════════════ */
function autoResize() {
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, 160) + "px";
}
input.addEventListener("input", autoResize);
input.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});

/* ═══════════════════════════════════════
   SEND
═══════════════════════════════════════ */
async function send() {
  const text = input.value.trim();
  if (!text || btn.disabled) return;

  // Auto-create session if none
  if (!currentSessId) {
    try {
      const r = await fetch("/sessions/new", { method: "POST", credentials: "include" });
      const d = await r.json();
      currentSessId = d.id;
      await loadSessions();
    } catch(e) { /* continue */ }
  }

  stopVoice();
  addUserMsg(text);
  input.value = "";
  autoResize();
  btn.disabled = true;
  forceScrollBottom();

  const loadId = showLoading();

  try {
    const res = await fetch("/chat", {
      method: "POST",
      credentials: "include",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text, history, model: selectedModel, session_id: currentSessId })
    });

    removeLoading(loadId);
    if (!res.ok) throw new Error("Server error");

    const data  = await res.json();
    const reply = (data.reply || "No response received.").trim();

    history.push({ role: "user",      content: text  });
    history.push({ role: "assistant", content: reply });

    typeMsg(reply);

    if (history.length === 2) loadSessions(); // refresh title

  } catch(err) {
    removeLoading(loadId);
    typeMsg("Connection lost. Check system status.");
  } finally {
    btn.disabled = false;
    input.focus();
  }
}

/* ═══════════════════════════════════════
   CHAT UI HELPERS
═══════════════════════════════════════ */
function clearChatUI() {
  chatEl.innerHTML = "";
  isTyping = false;
  userScrolledUp = false;
  scrollBtn.classList.remove("visible");
  checkEmpty();
}

function addUserMsg(text) {
  const div  = document.createElement("div");
  div.className = "msg user";
  const span = document.createElement("span");
  span.className = "msg-content";
  const dots = makeDots();
  div.appendChild(span);
  div.appendChild(dots);
  chatEl.appendChild(div);
  checkEmpty();
  autoScroll();

  let i = 0;
  function type() {
    if (i < text.length) { span.textContent += text.charAt(i++); autoScroll(); setTimeout(type, 14); }
    else { dots.remove(); div.insertAdjacentHTML("beforeend", getCopyBtnHTML()); }
  }
  type();
}

function addUserMsgInstant(text) {
  const div = document.createElement("div");
  div.className = "msg user";
  div.innerHTML = `<span class="msg-content">${escHtml(text)}</span>${getCopyBtnHTML()}`;
  chatEl.appendChild(div);
}

function addBotMsgInstant(text) {
  const div = document.createElement("div");
  div.className = "msg bot";
  div.innerHTML = `<span class="bot-label">BLANK_</span><span class="msg-content">${escHtml(text)}</span>${getCopyBtnHTML()}`;
  chatEl.appendChild(div);
}

function showLoading() {
  const id  = "load-" + Date.now();
  const div = document.createElement("div");
  div.className = "msg bot";
  div.id = id;
  div.innerHTML = `<span class="bot-label">BLANK_</span><div class="spinner"></div>`;
  chatEl.appendChild(div);
  autoScroll();
  return id;
}
function removeLoading(id) { const el = document.getElementById(id); if (el) el.remove(); }

function typeMsg(text) {
  isTyping = true;
  userScrolledUp = false;

  const div    = document.createElement("div");
  div.className = "msg bot";
  const label  = document.createElement("span");
  label.className = "bot-label";
  label.textContent = "BLANK_";
  const spinner = document.createElement("div");
  spinner.className = "spinner";
  const span   = document.createElement("span");
  span.className = "msg-content";
  const dots   = makeDots();

  div.appendChild(label);
  div.appendChild(spinner);
  div.appendChild(span);
  div.appendChild(dots);
  chatEl.appendChild(div);
  autoScroll();

  let i = 0;
  function type() {
    if (i < text.length) {
      if (i === 0 && spinner.parentNode) spinner.remove();
      span.textContent += text.charAt(i++);
      autoScroll();
      setTimeout(type, 16);
    } else {
      isTyping = false;
      dots.remove();
      div.insertAdjacentHTML("beforeend", getCopyBtnHTML());
    }
  }
  type();
}

function makeDots() {
  const w = document.createElement("span");
  w.className = "dot-typing";
  w.innerHTML = "<span></span><span></span><span></span>";
  return w;
}

function copyText(b) {
  const span = b.closest(".msg").querySelector(".msg-content");
  if (!span) return;
  navigator.clipboard.writeText(span.textContent).then(() => {
    b.innerHTML = `<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z" fill="#00ff87"/></svg>`;
    setTimeout(() => { b.innerHTML = copyIconSVG(); }, 2000);
  });
}
function copyIconSVG() {
  return `<svg viewBox="0 0 24 24"><path d="M16 1H4C2.9 1 2 1.9 2 3V17H4V3H16V1ZM19 5H8C6.9 5 6 5.9 6 7V21C6 22.1 6.9 23 8 23H19C20.1 23 21 22.1 21 21V7C21 5.9 20.1 5 19 5ZM19 21H8V7H19V21Z"/></svg>`;
}
function getCopyBtnHTML() {
  return `<button class="copy-btn" onclick="copyText(this)" title="Copy">${copyIconSVG()}</button>`;
}
function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

/* ═══════════════════════════════════════
   MODEL DROPDOWN
═══════════════════════════════════════ */
function toggleModelDropdown() {
  const trigger  = document.getElementById("modelTrigger");
  const dropdown = document.getElementById("modelDropdown");
  const isOpen   = dropdown.classList.contains("open");

  if (!isOpen) {
    const rect = trigger.getBoundingClientRect();
    dropdown.style.top       = (rect.bottom + 6) + "px";
    dropdown.style.left      = (rect.left + rect.width / 2) + "px";
    dropdown.style.transform = "translateX(-50%)";
  }

  dropdown.classList.toggle("open", !isOpen);
  trigger.classList.toggle("open", !isOpen);
}

function selectModel(el) {
  document.querySelectorAll(".model-option").forEach(o => o.classList.remove("selected"));
  el.classList.add("selected");
  selectedModel = el.dataset.value;
  document.getElementById("modelLabel").textContent = el.childNodes[0].textContent.trim();
  document.getElementById("modelDropdown").classList.remove("open");
  document.getElementById("modelTrigger").classList.remove("open");
}

document.addEventListener("click", e => {
  const pill = document.getElementById("modelPill");
  if (pill && !pill.contains(e.target)) {
    document.getElementById("modelDropdown").classList.remove("open");
    document.getElementById("modelTrigger").classList.remove("open");
  }
});

/* ═══════════════════════════════════════
   VOICE
═══════════════════════════════════════ */
let recognition = null;
let isListening  = false;

function toggleVoice() {
  if (isListening) { stopVoice(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { typeMsg("Voice input not supported. Try Chrome or Edge."); return; }

  recognition = new SR();
  recognition.lang = "en-US";
  recognition.interimResults = true;
  recognition.continuous = false;

  recognition.onstart  = () => { isListening = true;  micBtn.classList.add("listening");    voiceToast.classList.add("visible"); };
  recognition.onend    = () => { isListening = false; micBtn.classList.remove("listening"); voiceToast.classList.remove("visible"); recognition = null; };
  recognition.onerror  = e  => { isListening = false; micBtn.classList.remove("listening"); voiceToast.classList.remove("visible"); recognition = null; };
  recognition.onresult = e  => {
    let interim = "", final = "";
    for (let i = 0; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      e.results[i].isFinal ? (final += t) : (interim += t);
    }
    input.value = final || interim;
    autoResize();
  };

  recognition.start();
}
function stopVoice() { if (recognition && isListening) recognition.stop(); }

/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
checkEmpty();
loadSessions();

/* Expose for onclick */
window.send               = send;
window.toggleSidebar      = toggleSidebar;
window.closeSidebar       = closeSidebar;
window.startNewChat       = startNewChat;
window.loadSession        = loadSession;
window.deleteSession      = deleteSession;
window.forceScrollBottom  = forceScrollBottom;
window.copyText           = copyText;
window.toggleVoice        = toggleVoice;
window.toggleModelDropdown = toggleModelDropdown;
window.selectModel        = selectModel;
window.checkEmpty         = checkEmpty;
</script>
</body>
</html>
