<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>BLANK_</title>

<style>
:root {
  --bg-color: #050505;
  --chat-bg: #000000;
  --border-color: rgba(255, 255, 255, 0.08);
  --text-primary: #ffffff;
  --text-secondary: #888888;
  --font-stack: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  outline: none;
  -webkit-tap-highlight-color: transparent;
}

body {
  background: var(--bg-color);
  color: var(--text-primary);
  font-family: var(--font-stack);
  height: 100dvh;
  width: 100vw;
  display: flex;
  justify-content: center;
  overflow: hidden;
}

.app-container {
  width: 100%;
  max-width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  position: relative;
  background: var(--chat-bg);
}

header {
  padding: 24px 20px;
  text-align: center;
  position: absolute;
  top: 0; left: 0; right: 0;
  z-index: 10;
  background: linear-gradient(to bottom, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0) 100%);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
}

header h1 {
  font-size: 1.6rem;
  font-weight: 800;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  background: linear-gradient(110deg, #555 30%, #fff 50%, #555 70%);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: shimmer 8s linear infinite;
}

header span {
  display: block;
  font-size: 0.6rem;
  font-weight: 500;
  color: var(--text-secondary);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-top: 5px;
}

.model-pill {
  display: inline-block;
  margin-top: 8px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 4px 12px;
}
.model-pill select {
  background: transparent;
  border: none;
  color: #666;
  font-size: 0.6rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
  font-family: var(--font-stack);
}
.model-pill select option { background: #111; color: #fff; }

@keyframes shimmer { to { background-position: -200% center; } }

#chat {
  flex: 1;
  width: 100%;
  padding-top: 130px;
  padding-bottom: 160px;
  padding-left: max(32px, calc((100% - 780px) / 2));
  padding-right: max(32px, calc((100% - 780px) / 2));
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 36px;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
}

#chat::-webkit-scrollbar { width: 6px; }
#chat::-webkit-scrollbar-thumb { background: #222; border-radius: 4px; }
#chat::-webkit-scrollbar-track { background: transparent; }

.msg {
  width: fit-content;
  max-width: 80%;
  line-height: 1.85;
  font-size: 1rem;
  position: relative;
  padding-bottom: 4px;
}

.msg-content {
  display: block;
  white-space: pre-wrap;
  word-break: break-word;
  letter-spacing: 0.01em;
}

.user {
  align-self: flex-end;
  text-align: right;
  color: #fff;
  animation: slideUp 0.3s ease-out;
}

.bot {
  align-self: flex-start;
  color: #a0a0a0;
}

.bot-label {
  display: block;
  font-size: 0.6rem;
  line-height: 1;
  margin-bottom: 10px;
  opacity: 0.35;
  letter-spacing: 2px;
  color: #fff;
}

.copy-btn {
  position: absolute;
  bottom: -22px;
  right: 0;
  background: transparent;
  border: none;
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.2s;
  padding: 4px;
}
.msg:hover .copy-btn { opacity: 1; }
.copy-btn svg { width: 14px; height: 14px; fill: #555; transition: fill 0.2s; }
.copy-btn:hover svg { fill: #fff; }

/* Spinner — waiting for API response */
.spinner {
  width: 20px;
  height: 20px;
  border: 2px solid rgba(255,255,255,0.08);
  border-top-color: rgba(255,255,255,0.45);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 4px 0 2px 2px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Dot typing indicator — shown while bot types */
.dot-typing {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  margin-left: 3px;
  vertical-align: middle;
  height: 1em;
}
.dot-typing span {
  display: inline-block;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: rgba(255,255,255,0.4);
  animation: dotBounce 1.2s ease-in-out infinite;
}
.dot-typing span:nth-child(1) { animation-delay: 0s; }
.dot-typing span:nth-child(2) { animation-delay: 0.2s; }
.dot-typing span:nth-child(3) { animation-delay: 0.4s; }

@keyframes dotBounce {
  0%, 60%, 100% { opacity: 0.2; transform: translateY(0); }
  30%            { opacity: 1;   transform: translateY(-4px); }
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Input area */
.input-area {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  width: 90%;
  max-width: 800px;
  z-index: 100;
  display: flex;
  align-items: flex-end;
  gap: 8px;
  background: rgba(28, 28, 28, 0.75);
  backdrop-filter: blur(25px);
  -webkit-backdrop-filter: blur(25px);
  padding: 10px 14px;
  border-radius: 24px;
  border: 1px solid var(--border-color);
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  transition: border-color 0.2s;
}
.input-area:focus-within { border-color: rgba(255,255,255,0.2); }

/* Expanding textarea */
#input {
  flex: 1;
  background: transparent;
  border: none;
  color: white;
  padding: 6px 10px;
  font-size: 1.05rem;
  font-family: var(--font-stack);
  min-width: 0;
  resize: none;
  line-height: 1.5;
  max-height: 160px;
  overflow-y: auto;
  display: block;
}
#input::placeholder { color: #555; }
#input::-webkit-scrollbar { width: 4px; }
#input::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

/* Mic button */
.mic-btn {
  border: none;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  background: transparent;
  transition: background 0.2s;
  flex-shrink: 0;
}
.mic-btn svg { width: 20px; height: 20px; fill: #555; transition: fill 0.2s; }
.mic-btn:hover svg { fill: #bbb; }
.mic-btn.listening { background: rgba(255,50,50,0.12); }
.mic-btn.listening svg { fill: #ff4444; animation: pulse 1s ease-in-out infinite; }

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.5; transform: scale(0.88); }
}

/* Send button */
.send-btn {
  border: none;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  background: white;
  transition: transform 0.2s, opacity 0.2s;
  animation: buttonGlow 3s ease-in-out infinite;
  flex-shrink: 0;
}
.send-btn:hover { transform: scale(1.05); }
.send-btn svg { width: 20px; height: 20px; fill: black; transform: translateX(2px); }
.send-btn:disabled { opacity: 0.5; animation: none; transform: none; }

@keyframes buttonGlow {
  0%, 100% { box-shadow: 0 0 0px rgba(255,255,255,0); }
  50%       { box-shadow: 0 0 20px rgba(255,255,255,0.5); }
}

/* Clear button */
.clear-btn {
  position: fixed;
  top: 16px;
  right: 20px;
  z-index: 20;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.08);
  color: #444;
  font-family: var(--font-stack);
  font-size: 0.55rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 5px 10px;
  border-radius: 20px;
  cursor: pointer;
  transition: color 0.2s, border-color 0.2s;
}
.clear-btn:hover { color: #aaa; border-color: rgba(255,255,255,0.2); }

/* Scroll-to-bottom button */
#scrollBtn {
  position: fixed;
  bottom: 110px;
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  z-index: 99;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: rgba(35,35,35,0.92);
  border: 1px solid rgba(255,255,255,0.12);
  color: #aaa;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s, transform 0.25s;
  backdrop-filter: blur(10px);
}
#scrollBtn.visible {
  opacity: 1;
  pointer-events: all;
  transform: translateX(-50%) translateY(0);
}
#scrollBtn:hover { background: rgba(60,60,60,0.95); color: #fff; }
#scrollBtn svg { width: 18px; height: 18px; fill: currentColor; }

/* Voice toast */
#voiceToast {
  position: fixed;
  bottom: 96px;
  left: 50%;
  transform: translateX(-50%) translateY(6px);
  background: rgba(255,50,50,0.12);
  border: 1px solid rgba(255,80,80,0.25);
  color: #ff6666;
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 6px 14px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s, transform 0.2s;
  z-index: 98;
}
#voiceToast.visible {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

@media (max-width: 768px) {
  header h1 { font-size: 1.2rem; }
  .msg { max-width: 92%; font-size: 0.95rem; }
  #chat { padding: 100px 16px 130px; }
  .input-area { bottom: 12px; width: 94%; padding: 8px 10px; border-radius: 20px; }
  .copy-btn { opacity: 0.5; bottom: -24px; }
  #scrollBtn { bottom: 96px; }
  #voiceToast { bottom: 88px; }
}
</style>
</head>

<body>
<div class="app-container">

  <header>
    <h1>BLANK_</h1>
    <span>System Online</span>
    <div class="model-pill">
      <select id="modelSelect">
        <option value="llama-3.3-70b-versatile">Llama 3.3 70B</option>
        <option value="llama-3.1-8b-instant">Llama 3.1 8B ⚡</option>
        <option value="mixtral-8x7b-32768">Mixtral 8x7B</option>
        <option value="gemma2-9b-it">Gemma 2 9B</option>
      </select>
    </div>
  </header>

  <button class="clear-btn" onclick="clearChat()">Clear</button>

  <button id="scrollBtn" onclick="forceScrollBottom()" title="Scroll to bottom">
    <svg viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg>
  </button>

  <div id="voiceToast">● Listening…</div>

  <div id="chat">
    <div class="msg bot">
      <span class="bot-label">BLANK_</span>
      <span class="msg-content">Ready.</span>
    </div>
  </div>

  <div class="input-area">
    <textarea
      id="input"
      placeholder="Ask BLANK_"
      autocomplete="off"
      rows="1"
    ></textarea>

    <button id="micBtn" class="mic-btn" onclick="toggleVoice()" title="Voice input">
      <svg viewBox="0 0 24 24">
        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3.01 2.83 5.4 5.91 5.88V20H9c-.55 0-1 .45-1 1s.45 1 1 1h6c.55 0 1-.45 1-1s-.45-1-1-1h-2v-2.02c3.08-.47 5.42-2.87 5.91-5.88.1-.6-.39-1.1-1-1.1z"/>
      </svg>
    </button>

    <button id="sendBtn" class="send-btn" onclick="send()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

</div>
<script>
const chat        = document.getElementById("chat");
const input       = document.getElementById("input");
const btn         = document.getElementById("sendBtn");
const micBtn      = document.getElementById("micBtn");
const modelSelect = document.getElementById("modelSelect");
const scrollBtn   = document.getElementById("scrollBtn");
const voiceToast  = document.getElementById("voiceToast");

let history = [];
let userScrolledUp = false;
let isTyping = false;

/* ── Scroll ── */
chat.addEventListener("scroll", () => {
  const dist = chat.scrollHeight - chat.scrollTop - chat.clientHeight;
  userScrolledUp = dist > 80;
  scrollBtn.classList.toggle("visible", userScrolledUp);
});

// On mobile touch while typing — user wants to scroll, let them
chat.addEventListener("touchstart", () => {
  if (isTyping) userScrolledUp = true;
}, { passive: true });

function forceScrollBottom() {
  chat.scrollTop = chat.scrollHeight;
  userScrolledUp = false;
  scrollBtn.classList.remove("visible");
}

function autoScroll() {
  if (!userScrolledUp) chat.scrollTop = chat.scrollHeight;
}

/* ── Expanding textarea ── */
function autoResize() {
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, 160) + "px";
}
input.addEventListener("input", autoResize);

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

/* ── Send ── */
async function send() {
  const text = input.value.trim();
  if (!text || btn.disabled) return;

  stopVoice();
  addUserMsg(text);
  input.value = "";
  autoResize();
  btn.disabled = true;
  forceScrollBottom();

  const loadingId = showLoading();

  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text, history, model: modelSelect.value })
    });

    removeLoading(loadingId);
    if (!res.ok) throw new Error("Server error");

    const data = await res.json();
    const reply = (data.reply || "No response received.").trim();

    history.push({ role: "user", content: text });
    history.push({ role: "assistant", content: reply });

    typeMsg(reply);
  } catch (err) {
    removeLoading(loadingId);
    typeMsg("Connection lost. Check system status.");
  } finally {
    btn.disabled = false;
    input.focus();
  }
}

/* ── Clear ── */
function clearChat() {
  history = [];
  chat.innerHTML = "";
  const div = document.createElement("div");
  div.className = "msg bot";
  div.innerHTML = `<span class="bot-label">BLANK_</span><span class="msg-content">Ready.</span>`;
  chat.appendChild(div);
  userScrolledUp = false;
  isTyping = false;
  scrollBtn.classList.remove("visible");
}

/* ── User message with dot cursor ── */
function addUserMsg(text) {
  const div = document.createElement("div");
  div.className = "msg user";
  const textSpan = document.createElement("span");
  textSpan.className = "msg-content";
  const dots = makeDots();
  div.appendChild(textSpan);
  div.appendChild(dots);
  chat.appendChild(div);
  autoScroll();

  let i = 0;
  function type() {
    if (i < text.length) {
      textSpan.textContent += text.charAt(i++);
      autoScroll();
      setTimeout(type, 14);
    } else {
      dots.remove();
      div.insertAdjacentHTML("beforeend", getCopyBtnHTML());
    }
  }
  type();
}

/* ── Loading spinner (API wait) ── */
function showLoading() {
  const id = "loading-" + Date.now();
  const div = document.createElement("div");
  div.className = "msg bot";
  div.id = id;
  div.innerHTML = `<span class="bot-label">BLANK_</span><div class="spinner"></div>`;
  chat.appendChild(div);
  autoScroll();
  return id;
}

function removeLoading(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

/* ── Bot message: spinner → typewriter + dots ── */
function typeMsg(text) {
  isTyping = true;
  userScrolledUp = false;

  const div = document.createElement("div");
  div.className = "msg bot";

  const label = document.createElement("span");
  label.className = "bot-label";
  label.textContent = "BLANK_";

  const spinner = document.createElement("div");
  spinner.className = "spinner";

  const textSpan = document.createElement("span");
  textSpan.className = "msg-content";

  const dots = makeDots();

  div.appendChild(label);
  div.appendChild(spinner);
  div.appendChild(textSpan);
  div.appendChild(dots);
  chat.appendChild(div);
  autoScroll();

  let i = 0;
  function type() {
    if (i < text.length) {
      if (i === 0 && spinner.parentNode) spinner.remove();
      textSpan.textContent += text.charAt(i++);
      autoScroll();
      setTimeout(type, 16);
    } else {
      isTyping = false;
      dots.remove();
      div.insertAdjacentHTML("beforeend", getCopyBtnHTML());
    }
  }
  type();
}

/* ── Dot typing indicator ── */
function makeDots() {
  const wrap = document.createElement("span");
  wrap.className = "dot-typing";
  wrap.innerHTML = "<span></span><span></span><span></span>";
  return wrap;
}

/* ── Copy ── */
function copyText(btnEl) {
  const textSpan = btnEl.closest(".msg").querySelector(".msg-content");
  if (!textSpan) return;
  navigator.clipboard.writeText(textSpan.textContent).then(() => {
    btnEl.innerHTML = `<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z" fill="#00ff87"/></svg>`;
    setTimeout(() => { btnEl.innerHTML = copyIconSVG(); }, 2000);
  });
}

function copyIconSVG() {
  return `<svg viewBox="0 0 24 24"><path d="M16 1H4C2.9 1 2 1.9 2 3V17H4V3H16V1ZM19 5H8C6.9 5 6 5.9 6 7V21C6 22.1 6.9 23 8 23H19C20.1 23 21 22.1 21 21V7C21 5.9 20.1 5 19 5ZM19 21H8V7H19V21Z"/></svg>`;
}

function getCopyBtnHTML() {
  return `<button class="copy-btn" onclick="copyText(this)" title="Copy">${copyIconSVG()}</button>`;
}

/* ── Voice ── */
let recognition = null;
let isListening = false;

function toggleVoice() {
  if (isListening) { stopVoice(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { typeMsg("Voice input not supported. Try Chrome or Edge."); return; }

  recognition = new SR();
  recognition.lang = "en-US";
  recognition.interimResults = true;
  recognition.continuous = false;

  recognition.onstart = () => {
    isListening = true;
    micBtn.classList.add("listening");
    voiceToast.classList.add("visible");
  };

  recognition.onresult = (e) => {
    let interim = "", final = "";
    for (let i = 0; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      e.results[i].isFinal ? (final += t) : (interim += t);
    }
    input.value = final || interim;
    autoResize();
  };

  recognition.onend = () => {
    isListening = false;
    micBtn.classList.remove("listening");
    voiceToast.classList.remove("visible");
    recognition = null;
  };

  recognition.onerror = (e) => {
    isListening = false;
    micBtn.classList.remove("listening");
    voiceToast.classList.remove("visible");
    recognition = null;
    if (e.error !== "no-speech" && e.error !== "aborted") console.warn("Voice error:", e.error);
  };

  recognition.start();
}

function stopVoice() {
  if (recognition && isListening) recognition.stop();
}
</script>
</body>
</html>
